<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpyLens - 불법촬영 카메라 탐지</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:20px;
    background:#f4f4f4;
}

h1{
    color:#333;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:900px;
    margin:auto;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

canvas{
    max-width:100%;
    border:1px solid #ccc;
    margin-top:15px;
}

button{
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
}

button:hover{
    background:#0056b3;
}

#result{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔍 SpyLens</h1>
    <p>불법촬영 카메라 반사광 탐지 보조 서비스</p>

    <input type="file" id="imageInput" accept="image/*">
    <br>

    <button onclick="detectReflections()">탐지 시작</button>

    <p id="result"></p>

    <canvas id="canvas"></canvas>
</div>

<script>

const imageInput = document.getElementById('imageInput');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let uploadedImage = new Image();

imageInput.addEventListener('change', function(e){

    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        uploadedImage.onload = function(){

            canvas.width = uploadedImage.width;
            canvas.height = uploadedImage.height;

            ctx.drawImage(
                uploadedImage,
                0,
                0
            );
        };

        uploadedImage.src = event.target.result;
    };

    reader.readAsDataURL(file);
});

function detectReflections(){

    if(!uploadedImage.src){
        alert("이미지를 먼저 업로드하세요.");
        return;
    }

    ctx.drawImage(uploadedImage,0,0);

    const imageData = ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const data = imageData.data;

    let detections = [];

    for(let y=0; y<canvas.height; y+=8){

        for(let x=0; x<canvas.width; x+=8){

            const index =
                (y * canvas.width + x) * 4;

            const r = data[index];
            const g = data[index+1];
            const b = data[index+2];

            const brightness =
                (r+g+b)/3;

            if(brightness > 240){

                detections.push({
                    x:x,
                    y:y
                });
            }
        }
    }

    detections = detections.filter((point,index)=>{

        return index % 5 === 0;

    });

    ctx.lineWidth = 3;
    ctx.strokeStyle = "red";

    detections.forEach(point=>{

        ctx.beginPath();

        ctx.arc(
            point.x,
            point.y,
            15,
            0,
            Math.PI*2
        );

        ctx.stroke();
    });

    document.getElementById("result").innerText =
        `의심 반사 지점 ${detections.length}개 발견`;
}

</script>

</body>
</html>
